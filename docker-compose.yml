services:
  postgres:
    image: postgres:16
    container_name: validationiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-validationiq}
      POSTGRES_USER: ${DB_USERNAME:-validationiq}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-validationiq}
    ports:
      - "5432:5432"
    volumes:
      - validationiq-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-validationiq} -d ${DB_NAME:-validationiq}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  validationiq-pgdata:
