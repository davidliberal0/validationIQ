spring.application.name=validationiq

# Database connection - overridable via env vars per spec section 17.
# Defaults match the docker-compose postgres service.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/validationiq}
spring.datasource.username=${DB_USERNAME:validationiq}
spring.datasource.password=${DB_PASSWORD:validationiq}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - dev-only convenience since no entities exist yet.
# Not a migration strategy - revisit once entities are added in Phase 2.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Fail fast on startup if the DB is unreachable, rather than a lazy pool error later
spring.datasource.hikari.connection-timeout=5000
